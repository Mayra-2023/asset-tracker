<!DOCTYPE html>

<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asset Analytics Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body class="bg-light">

<div class="container-fluid p-4">

<h2 class="mb-4">
    Asset Analytics Dashboard
</h2>

<!-- KPI CARDS -->

<div class="row mb-4">

    <div class="col-md-2">
        <div class="card shadow-sm border-primary">
            <div class="card-body text-center">
                <h6>Total Assets</h6>
                <h3>{{ total_assets }}</h3>
            </div>
        </div>
    </div>

    <div class="col-md-2">
        <div class="card shadow-sm border-success">
            <div class="card-body text-center">
                <h6>Active</h6>
                <h3>{{ active_assets }}</h3>
            </div>
        </div>
    </div>

    <div class="col-md-2">
        <div class="card shadow-sm border-warning">
            <div class="card-body text-center">
                <h6>Maintenance</h6>
                <h3>{{ maintenance_assets }}</h3>
            </div>
        </div>
    </div>

    <div class="col-md-2">
        <div class="card shadow-sm border-danger">
            <div class="card-body text-center">
                <h6>Missing</h6>
                <h3>{{ missing_assets }}</h3>
            </div>
        </div>
    </div>

    <div class="col-md-2">
        <div class="card shadow-sm border-dark">
            <div class="card-body text-center">
                <h6>To Be Scrapped</h6>
                <h3>{{ to_be_scrapped_assets }}</h3>
            </div>
        </div>
    </div>

    <div class="col-md-2">
        <div class="card shadow-sm border-secondary">
            <div class="card-body text-center">
                <h6>Scrapped</h6>
                <h3>{{ scrapped_assets }}</h3>
            </div>
        </div>
    </div>

</div>

<!-- FILTER -->

<!-- FILTER -->

<div class="row mb-4">

    <div class="col-md-4">

        <form method="GET">

            <label class="form-label">
                Select Depot
            </label>

            <select name="depot" class="form-select">

                <option value="">All Depots</option>

                {% for depot in depots %}
                <option value="{{ depot }}"
                    {% if depot == selected_depot %}selected{% endif %}>
                    {{ depot }}
                </option>
                {% endfor %}

            </select>

            <button type="submit" class="btn btn-primary mt-2">
                Filter
            </button>

        </form>

    </div>

</div>

<!-- CHARTS -->

<div class="row">

    <div class="col-md-6">

        <div class="card shadow-sm">
            <div class="card-header">
                Assets by Depot
            </div>

            <div class="card-body">
                <canvas id="depotChart"></canvas>
            </div>

        </div>

    </div>

    <div class="col-md-6">

        <div class="card shadow-sm">
            <div class="card-header">
                Assets by Status
            </div>

            <div class="card-body">
                <canvas id="statusChart"></canvas>
            </div>

        </div>

    </div>

</div>

</div>

<script>

const depotChart = new Chart(
    document.getElementById('depotChart'),
    {
        type: 'bar',
        data: {
            labels: {{ depot_labels | tojson }},
            datasets: [{
                label: 'Assets',
                data: {{ depot_values | tojson }},
                borderWidth: 1
            }]
        },
        options: {
            responsive: true
        }
    }
);

const statusChart = new Chart(
    document.getElementById('statusChart'),
    {
        type: 'pie',
        data: {
            labels: {{ status_labels | tojson }},
            datasets: [{
                data: {{ status_values | tojson }}
            }]
        },
        options: {
            responsive: true
        }
    }
);

</script>

</body>
</html>
