<!DOCTYPE html>

<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asset Analytics Dashboard</title>


<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body class="bg-light">

<div class="container-fluid p-4">

<h2 class="mb-4">
    Asset Analytics Dashboard
</h2>

<div class="row mb-4">

    <div class="col-md-3">
        <div class="card shadow-sm">
            <div class="card-body">
                <h6>Total Assets</h6>
                <h3>{{ total_assets }}</h3>
            </div>
        </div>
    </div>

    <div class="col-md-3">
        <div class="card shadow-sm">
            <div class="card-body">
                <h6>Active Assets</h6>
                <h3>{{ active_assets }}</h3>
            </div>
        </div>
    </div>

    <div class="col-md-3">
        <div class="card shadow-sm">
            <div class="card-body">
                <h6>Repair Assets</h6>
                <h3>{{ repair_assets }}</h3>
            </div>
        </div>
    </div>

    <div class="col-md-3">
        <div class="card shadow-sm">
            <div class="card-body">
                <h6>Scrap Assets</h6>
                <h3>{{ scrap_assets }}</h3>
            </div>
        </div>
    </div>

</div>

<div class="row mb-4">

    <div class="col-md-3">

        <label class="form-label">
            Select Depot
        </label>

        <select class="form-select">
            <option>All Depots</option>

            {% for depot in depots %}
            <option>{{ depot }}</option>
            {% endfor %}

        </select>

    </div>

</div>

<div class="row">

    <div class="col-md-6">

        <div class="card shadow-sm">
            <div class="card-header">
                Assets by Depot
            </div>

            <div class="card-body">
                <canvas id="depotChart"></canvas>
            </div>

        </div>

    </div>

    <div class="col-md-6">

        <div class="card shadow-sm">
            <div class="card-header">
                Assets by Status
            </div>

            <div class="card-body">
                <canvas id="statusChart"></canvas>
            </div>

        </div>

    </div>

</div>

</div>

<script>

const depotChart = new Chart(
    document.getElementById('depotChart'),
    {
        type: 'bar',
        data: {
            labels: {{ depot_labels | tojson }},
            datasets: [{
                label: 'Assets',
                data: {{ depot_values | tojson }}
            }]
        }
    }
);

const statusChart = new Chart(
    document.getElementById('statusChart'),
    {
        type: 'pie',
        data: {
            labels: {{ status_labels | tojson }},
            datasets: [{
                data: {{ status_values | tojson }}
            }]
        }
    }
);

</script>

</body>
</html>
