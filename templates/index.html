<!-- NOVO: EXPORT DATA COM OPÇÕES -->
<div class="card">
    <h2>Export Data</h2>
    <p>Download assets by depot and verification status.</p>

    <div style="display:flex; flex-direction:column; gap:10px;">

        <!-- Export por Depot -->
        <form action="/export" method="GET">
            <label><strong>Export by Depot:</strong></label>
            <select name="depot">
                <option value="all">All Depots</option>
                <option value="A">Depot A</option>
                <option value="B">Depot B</option>
                <option value="C">Depot C</option>
            </select>
            <input type="hidden" name="filter" value="all">
            <button class="btn" type="submit">Download</button>
        </form>

        <!-- Export Verificados -->
        <form action="/export" method="GET">
            <label><strong>Verified Only:</strong></label>
            <input type="hidden" name="filter" value="verified">
            <input type="hidden" name="depot" value="all">
            <button class="btn" type="submit">Download</button>
        </form>

        <!-- Export Não Verificados -->
        <form action="/export" method="GET">
            <label><strong>Unverified Only:</strong></label>
            <input type="hidden" name="filter" value="unverified">
            <input type="hidden" name="depot" value="all">
            <button class="btn" type="submit">Download</button>
        </form>

        <!-- Export Geral -->
        <form action="/export" method="GET">
            <label><strong>All Assets (&lt;180 days)</strong></label>
            <input type="hidden" name="filter" value="all">
            <input type="hidden" name="depot" value="all">
            <button class="btn" type="submit">Download</button>
        </form>

    </div>
</div>
